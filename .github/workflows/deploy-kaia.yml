name: Deploy Kaia Checklist Worker
# Note: trigger this workflow when edited directly.

on:
  push:
    branches: [main]
    paths:
      - "kaia/**"
      - ".github/workflows/deploy-kaia.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: kaia
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: kaia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build OpenNext output
        run: npm run cf:build

      - name: Cloudflare preflight
        uses: ./.github/actions/cloudflare-preflight
        with:
          api_token: ${{ env.CLOUDFLARE_API_TOKEN }}
          account_id: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx opennextjs-cloudflare deploy

      - name: Apply D1 schema
        run: npm run db:remote

      - name: Smoke test production routes
        run: |
          curl --fail --silent --show-error "https://kaia.digiartifact.com/" > /dev/null
          admin_status=$(curl --silent --output /dev/null --write-out "%{http_code}" "https://kaia.digiartifact.com/admin/login")
          if [ "$admin_status" -ne 200 ]; then
            echo "Unexpected /admin/login status: $admin_status"
            exit 1
          fi
          status=$(curl --silent --output /dev/null --write-out "%{http_code}" "https://kaia.digiartifact.com/api/auth/me")
          if [ "$status" -ne 200 ] && [ "$status" -ne 401 ]; then
            echo "Unexpected /api/auth/me status: $status"
            exit 1
          fi
