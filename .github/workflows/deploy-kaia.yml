name: Deploy Kaia Checklist Worker

on:
  push:
    branches: [main]
    paths:
      - "kaia/**"
      - ".github/workflows/deploy-kaia.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: kaia
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: kaia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build OpenNext output
        run: npm run cf:build

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing Cloudflare API token. Set repo secret CLOUDFLARE_API_TOKEN (or CF_API_TOKEN)."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing Cloudflare account id. Set repo secret CLOUDFLARE_ACCOUNT_ID (or CF_ACCOUNT_ID)."
            exit 1
          fi

      - name: Deploy Worker
        run: npx opennextjs-cloudflare deploy

      - name: Apply D1 schema
        run: npm run db:remote

      - name: Smoke test production routes
        run: |
          curl --fail --silent --show-error "https://kaia.digiartifact.com/" > /dev/null
          status=$(curl --silent --output /dev/null --write-out "%{http_code}" "https://kaia.digiartifact.com/api/auth/me")
          if [ "$status" -ne 200 ] && [ "$status" -ne 401 ]; then
            echo "Unexpected /api/auth/me status: $status"
            exit 1
          fi
